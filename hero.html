<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        /* Container Setup */
        .banner-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #004a99; /* Deep Blue Brand Color */
            color: white;
            padding: 60px;
            font-family: 'Arial', sans-serif;
            width: 100%;
            max-width: 1000px;
            margin: 20px auto;
            box-sizing: border-box;
        }

        /* Text Styling */
        .text-side {
            flex: 1;
            padding-right: 40px;
        }

        .text-side h1 {
            font-size: 3rem;
            margin: 0 0 20px 0;
            line-height: 1.1;
            text-transform: uppercase;
        }

        .text-side p {
            font-size: 1.2rem;
            line-height: 1.6;
            opacity: 0.9;
        }

        /* Hexagon Container */
        .image-side {
            flex: 0 0 40%;
            display: flex;
            justify-content: center;
        }

        .hex-clip {
            width: 350px;
            height: 350px;
            background-color: #ddd;
            /* Defines the hexagon shape */
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            overflow: hidden;
        }

        .hex-clip img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="banner-container">
        <div class="text-side">
            <h1>VIDEO &<br>ANIMATION</h1>
            <p>We craft high-fidelity visual stories that elevate your brand and captivate your audience across every digital platform.</p>
        </div>
        <div class="image-side">
            <div class="hex-clip">
                <img src="https://images.unsplash.com/photo-1552664730-d307ca884978?auto=format&fit=crop&w=800&q=80" alt="Business Meeting">
            </div>
        </div>
    </div>

</body>
</html>
